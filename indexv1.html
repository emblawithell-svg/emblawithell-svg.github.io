<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Luxury Digital Wardrobe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light: #FFD1DC;
            --pink-dark: #FFB6C1;
            --lavender: #E6E6FA;
            --gold: #D4AF37;
            --white: #ffffff;
            --text: #4A4A4A;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--lavender);
            color: var(--text);
            overflow-x: hidden;
        }

        /* --- GARDEROBSDÖRRAR --- */
        #wardrobe-entrance {
            position: fixed;
            width: 100%;
            height: 100vh;
            display: flex;
            z-index: 100;
            cursor: pointer;
            transition: transform 1.5s ease-in-out;
        }

        .door {
            width: 50%;
            height: 100%;
            background: var(--pink-light);
            border: 8px solid var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s ease-in-out;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        .left-door { border-right: 4px solid var(--gold); transform-origin: left; }
        .right-door { border-left: 4px solid var(--gold); transform-origin: right; }

        .handle {
            width: 20px;
            height: 100px;
            background: var(--gold);
            border-radius: 10px;
        }

        .open .left-door { transform: rotateY(-110deg); }
        .open .right-door { transform: rotateY(110deg); }
        .hidden { display: none !important; }

        /* --- HUVUDMENY --- */
        #main-app {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--pink-dark); font-size: 3rem; }

        .room-nav {
            display: flex;
            justify-content: space-around;
            padding: 50px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .nav-item {
            cursor: pointer;
            transition: transform 0.3s;
        }

        .nav-item:hover { transform: scale(1.1); }

        .nav-icon { font-size: 50px; display: block; }

        /* --- DASHBOARD / ADD CLOTHES --- */
        .section {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .active { display: block; }

        input, select, button {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: 1px solid var(--pink-light);
        }

        button {
            background: var(--pink-dark);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- CLOTHES GRID --- */
        .clothes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .clothing-card {
            border: 2px solid var(--lavender);
            border-radius: 15px;
            padding: 10px;
            position: relative;
        }

        .clothing-card img { width: 100%; border-radius: 10px; }

        .fav-btn { position: absolute; top: 5px; right: 5px; cursor: pointer; }

        /* --- SHUFFLE OUTFIT --- */
        #shuffle-result {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="wardrobe-entrance" onclick="openWardrobe()">
        <div class="door left-door"><div class="handle"></div></div>
        <div class="door right-door"><div class="handle"></div></div>
    </div>

    <div id="main-app">
        <h1>Garderoben</h1>
        
        <div class="room-nav">
            <div class="nav-item" onclick="showSection('clothes')">
                <span class="nav-icon">👗</span>
                <p>Kläder</p>
            </div>
            <div class="nav-item" onclick="showSection('calendar')">
                <span class="nav-icon">📅</span>
                <p>Kalender</p>
            </div>
            <div class="nav-item" onclick="showSection('shuffle')">
                <span class="nav-icon">🎲</span>
                <p>Shuffle</p>
            </div>
        </div>

        <div id="clothes" class="section active">
            <h2>Mina Kläder</h2>
            <input type="file" id="imgInput" accept="image/*">
            <select id="categoryInput">
                <option value="Tröja">Tröja</option>
                <option value="Byxor">Byxor</option>
                <option value="Skor">Skor</option>
                <option value="Väska">Väska</option>
            </select>
            <button onclick="addClothing()">Spara plagg</button>
            <div class="clothes-grid" id="clothesGrid"></div>
        </div>

        <div id="calendar" class="section">
            <h2>Planerade Outfits</h2>
            <p>Här kan du se dina sparade dagar.</p>
            <div id="calendarView"></div>
        </div>

        <div id="shuffle" class="section">
            <h2>Slumpa Outfit</h2>
            <button onclick="shuffleOutfit()">Generera Look ✨</button>
            <div id="shuffle-result"></div>
        </div>
    </div>

    <script>
        let wardrobe = JSON.parse(localStorage.getItem('myWardrobe')) || [];

        function openWardrobe() {
            document.getElementById('wardrobe-entrance').classList.add('open');
            setTimeout(() => {
                document.getElementById('wardrobe-entrance').classList.add('hidden');
            }, 1200);
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'clothes') renderClothes();
        }

        function addClothing() {
            const file = document.getElementById('imgInput').files[0];
            const category = document.getElementById('categoryInput').value;
            
            if (!file) return alert("Välj en bild först!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const newItem = {
                    id: Date.now(),
                    image: e.target.result,
                    category: category,
                    favorite: false,
                    lastWorn: 'Aldrig'
                };
                wardrobe.push(newItem);
                saveData();
                renderClothes();
            };
            reader.readAsDataURL(file);
        }

        function renderClothes() {
            const grid = document.getElementById('clothesGrid');
            grid.innerHTML = '';
            wardrobe.forEach(item => {
                grid.innerHTML += `
                    <div class="clothing-card">
                        <span class="fav-btn" onclick="toggleFav(${item.id})">${item.favorite ? '❤️' : '🤍'}</span>
                        <img src="${item.image}">
                        <p>${item.category}</p>
                        <small>Sist: ${item.lastWorn}</small>
                    </div>
                `;
            });
        }

        function toggleFav(id) {
            const item = wardrobe.find(i => i.id === id);
            item.favorite = !item.favorite;
            saveData();
            renderClothes();
        }

        function shuffleOutfit() {
            const categories = ['Tröja', 'Byxor', 'Skor'];
            const resultDiv = document.getElementById('shuffle-result');
            resultDiv.innerHTML = '';

            categories.forEach(cat => {
                const items = wardrobe.filter(i => i.category === cat);
                if (items.length > 0) {
                    const random = items[Math.floor(Math.random() * items.length)];
                    resultDiv.innerHTML += `<img src="${random.image}" style="width:100px; height:100px; border-radius:10px; border:2px solid gold;">`;
                }
            });
            if(resultDiv.innerHTML === '') alert("Lägg till tröjor, byxor och skor först!");
        }

        function saveData() {
            localStorage.setItem('myWardrobe', JSON.stringify(wardrobe));
        }

        // Initiera
        renderClothes();
    </script>
</body>
</html>
